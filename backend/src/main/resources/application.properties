spring.application.name=meal-planner-api
server.port=8080

# ───── Default: H2 in-memory database (zero setup) ─────
# Switch to Supabase by running with --spring-boot.run.profiles=supabase
spring.datasource.url=jdbc:h2:mem:mealplanner
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Gemini API — set env var or leave blank (endpoint will return 0 calories)
gemini.api.key=${GEMINI_API_KEY:}
